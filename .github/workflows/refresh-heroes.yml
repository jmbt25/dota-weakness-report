name: Refresh heroes

# Pulls fresh /heroes data from OpenDota and regenerates
# src/data/heroes.json. Heroes change ~1-2 times per year (new hero
# release; tweaks like icon path don't break our resolver), so this
# refresh exists primarily as drift insurance — without it, a new hero
# released between our deploys would render as "Hero {id}" in /breakdowns
# prose until someone manually re-ran the script.
#
# Schedule: Mondays 12:00 UTC. Offset from refresh-meta (07:00),
# refresh-pro-corpus (09:30), and refresh-pro-baselines (11:00) so
# the four refreshes never collide on the OpenDota daily cap.
#
# Like the pro-corpus + pro-baselines workflows (and unlike the meta
# refresh which direct-commits), this opens a PR. Heroes payloads are
# small + stable so PR review is mostly a sanity check.

on:
  schedule:
    - cron: '0 12 * * 1'
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Refresh heroes JSON
        run: node scripts/refresh-heroes.mjs

      - name: Open pull request with refreshed heroes
        uses: peter-evans/create-pull-request@v6
        with:
          commit-message: 'chore(heroes): weekly refresh ${{ github.run_id }}'
          title: 'chore: weekly heroes.json refresh'
          body: |
            Automated weekly refresh of `src/data/heroes.json` from OpenDota.
            Triggered by `.github/workflows/refresh-heroes.yml`.

            ## What changed
            See the file diff for hero list deltas.

            Common reasons for changes:
            - Valve added a new hero (most likely cause of any diff at all)
            - localized_name updates (translation polish)
            - icon/img path tweaks (cosmetic; doesn't affect our resolver)

            ## What to check before merging
            - Total hero count is sensible (currently ~127; new heroes
              ship 1-2 per year)
            - No mass-rename of localized_name fields (would suggest an
              upstream schema change worth investigating before merge)

            🤖 Generated by `scripts/refresh-heroes.mjs`
          branch: refresh-heroes
          delete-branch: true
          base: main
