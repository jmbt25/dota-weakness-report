name: Refresh pro baselines

# Pulls fresh per-player rolling baselines for the curated /breakdowns-feature
# pro list and regenerates src/data/pro-baselines.json. Like the pro corpus
# refresh (and unlike the meta refresh), this opens a pull request rather
# than direct-committing — the corpus has more moving parts (per-pro list
# shifts, OpenDota outages, partial failures, sample size variance) and a
# human eyeball on the diff catches "we lost 12 baselines this week, is
# that a roster shake-up or an OpenDota schema change?".
#
# Manual dispatch is allowed for ad-hoc refreshes (e.g. before a tournament
# starts so the latest baselines ship in time).
#
# OPENDOTA_API_KEY:
#   Set via repo secrets (Settings → Secrets and variables → Actions).
#   With the key present, the script runs at premium-tier pacing (~3 min).
#   Without it, the script runs keyless (~38 min) and may bump the daily
#   cap on the GitHub Actions runner IP — so configuring the secret is
#   strongly recommended for the scheduled refresh.

on:
  schedule:
    # Mondays 11:00 UTC. Offset from refresh-meta.yml (07:00) and
    # refresh-pro-corpus.yml (09:30) so the three never collide on the
    # OpenDota daily cap (relevant only if OPENDOTA_API_KEY is missing).
    - cron: '0 11 * * 1'
  workflow_dispatch:

permissions:
  # peter-evans/create-pull-request needs both — contents to push the
  # branch, pull-requests to open the PR.
  contents: write
  pull-requests: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Refresh pro baselines JSON
        # Script exits non-zero on:
        #   - daily-cap exhaustion
        #   - OpenDota upstream down
        #   - >5 individual per-pro failures
        # GitHub default failure notifications fire on workflow failure;
        # repo-owner email picks up the alert.
        env:
          OPENDOTA_API_KEY: ${{ secrets.OPENDOTA_API_KEY }}
        run: node scripts/refresh-pro-baselines.mjs

      - name: Open pull request with refreshed baselines
        # Only runs if the previous step succeeded AND the JSON changed.
        # On no-op (empty diff), the action exits cleanly without opening
        # an empty PR.
        uses: peter-evans/create-pull-request@v6
        with:
          commit-message: 'chore(pro-baselines): weekly refresh ${{ github.run_id }}'
          title: 'chore: weekly pro baselines refresh'
          body: |
            Automated weekly refresh of `src/data/pro-baselines.json` from
            OpenDota. Triggered by `.github/workflows/refresh-pro-baselines.yml`.

            ## What changed
            See the file diff for per-pro baseline deltas.

            Common causes of changes:
            - Pros played new matches → rolling means shift
            - A pro joined or left a curated team → roster edit needed
              (see `scripts/pro-baselines-list.json`)
            - OpenDota field-shape change → talk to the maintainers

            ## What to check before merging
            - `corpus_size` matches `expected_count` (or the `skipped_pros`
              + `failed_pros` lists explain the gap)
            - No baseline has `matches_in_window: 0` (would be filtered as
              `skipped` automatically; sanity-check the list anyway)
            - The diff isn't suspicious (e.g. all 80 pros' `rolling_gpm`
              jumped by 200 — would suggest an OpenDota schema change)
            - `used_api_key: true` if the key is configured (false means
              the secret didn't reach the runner)

            🤖 Generated by `scripts/refresh-pro-baselines.mjs`
          branch: refresh-pro-baselines
          delete-branch: true
          base: main
