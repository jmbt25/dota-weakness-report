name: Refresh pro corpus

# Pulls fresh playstyle vectors for the curated TI 2026 cycle pro list and
# regenerates src/data/pro-vectors.json. Unlike the meta refresh (which
# direct-commits to main), this opens a pull request — the corpus has more
# moving parts (per-pro list shifts, OpenDota outages, partial failures)
# and a human eyeball on the diff catches cases like "we lost 12 vectors
# this week, is that an OpenDota change or a roster shake-up?".
#
# Manual dispatch is allowed for ad-hoc refreshes (e.g. roster lockup
# update at the start of a new TI cycle).

on:
  schedule:
    # Mondays 09:30 UTC. Offset 2.5 hours from refresh-meta.yml's 07:00 UTC
    # so the two never collide on the OpenDota daily cap.
    - cron: '30 9 * * 1'
  workflow_dispatch:

permissions:
  # peter-evans/create-pull-request needs both — contents to push the
  # branch, pull-requests to open the PR.
  contents: write
  pull-requests: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Refresh pro corpus JSON
        # Script exits non-zero on:
        #   - daily-cap exhaustion
        #   - OpenDota upstream down
        #   - >5 individual per-pro failures
        # GitHub default failure notifications fire on workflow failure;
        # repo-owner email picks up the alert. No retry-in-place — the
        # next scheduled run handles transient outages.
        run: node scripts/refresh-pro-corpus.mjs

      - name: Open pull request with refreshed corpus
        # Only runs if the previous step succeeded AND the JSON changed.
        # On no-op (empty diff), the action exits cleanly without opening
        # an empty PR.
        uses: peter-evans/create-pull-request@v6
        with:
          commit-message: 'chore(pro-corpus): weekly refresh ${{ github.run_id }}'
          title: 'chore: weekly pro corpus refresh'
          body: |
            Automated weekly refresh of `src/data/pro-vectors.json` from
            OpenDota. Triggered by `.github/workflows/refresh-pro-corpus.yml`.

            ## What changed
            See the file diff for per-pro vector deltas.

            Common causes of changes:
            - Pros played new matches → vector means shift
            - A pro joined or left a top-tier roster → curated list edit
              needed (see `scripts/pro-corpus-list.json`)
            - OpenDota field-shape change → talk to the maintainers

            ## What to check before merging
            - `pro_count` matches `expected_count` (or the `failed_pros`
              list explains the gap)
            - No vector has `match_count: 0` (would render as a
              degenerate point in the cosine similarity)
            - The diff isn't suspicious (e.g. all 60 pros' GPM jumped by
              200 — would suggest an OpenDota schema change)

            🤖 Generated by `scripts/refresh-pro-corpus.mjs`
          branch: refresh-pro-corpus
          delete-branch: true
          base: main
